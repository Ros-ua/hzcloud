<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VPS Monitor</title>

<style>
body { background:#080c10; color:#b8cfe0; font-family:sans-serif; }
.cards { display:grid; gap:10px; padding:20px; }
.vcard { border:1px solid #1a2840; padding:15px; border-radius:10px; }
</style>
</head>

<body>

<h2 style="padding:20px">VPS Monitor</h2>
<div class="cards" id="cards"></div>

<script>
let SERVERS = [];
let cache = {};

// 🔹 загрузка servers.json
async function loadServers() {
  const res = await fetch("./servers.json?v=" + Date.now());
  if (!res.ok) throw new Error("servers.json не найден");
  return await res.json();
}

// 🔹 загрузка данных из Gist
async function fetchGist(gistId) {
  const r = await fetch(`https://api.github.com/gists/${gistId}`);
  if (!r.ok) throw new Error("Ошибка Gist");
  const g = await r.json();
  const f = Object.values(g.files)[0];
  return JSON.parse(f.content);
}

// 🔹 построение карточек
function buildCards() {
  document.getElementById("cards").innerHTML = SERVERS.map((s, i) => `
    <div class="vcard" id="card-${i}">
      <b>${s.name}</b><br>
      <span id="data-${i}">Загрузка...</span>
    </div>
  `).join("");
}

// 🔹 загрузка одного сервера
async function loadServer(i, srv) {
  const el = document.getElementById("data-" + i);
  try {
    const data = await fetchGist(srv.gistId);
    el.innerHTML = `
      Host: ${data.hostname || "-"}<br>
      Uptime: ${data.uptime || "-"}
    `;
  } catch(e) {
    el.innerHTML = "Ошибка загрузки";
  }
}

// 🔹 загрузка всех
async function loadAll() {
  await Promise.all(SERVERS.map((s,i)=>loadServer(i,s)));
}

// 🔹 init
(async function init() {
  try {
    SERVERS = await loadServers();
    buildCards();
    loadAll();
  } catch(e) {
    document.body.innerHTML = "Ошибка загрузки servers.json";
  }
})();
</script>

</body>
</html>
